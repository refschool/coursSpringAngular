<div class="container">
    <div>
        <h2>Modifier un Prospect :</h2>
    </div>

    <form>
        <div hidden class="col-sm-2 col-md-2 col-lg-2">
            <label>ID Prospect</label>
            <input readonly type="text" [(ngModel)]="currentProspect.idProspect" name="idProspect" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Nom</label>
            <input type="text" [(ngModel)]="currentProspect.nom" name="nom" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Prénom</label>
            <input type="text" [(ngModel)]="currentProspect.prenom" name="prenom" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Email</label>
            <input type="email" [(ngModel)]="currentProspect.email" name="email" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Téléphone</label>
            <input type="text" [(ngModel)]="currentProspect.telephone" name="telephone" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Entreprise</label>
            <input type="text" [(ngModel)]="currentProspect.entreprise" name="entreprise" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Source</label>
            <input type="text" [(ngModel)]="currentProspect.source" name="source" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Date création</label>
            <input type="date" [(ngModel)]="currentProspect.dateCreation" name="dateCreation" class="form-control">
        </div>

        <div class="col-sm-4 col-md-4 col-lg-4">
            <label for="idCommercial" class="form-label">Commercial</label>

            <select class="form-control form-control-lg" id="idCommercial" name="idCommercial"
                [(ngModel)]="updatedCommercialId">

                @for (com of commercial; track com.idCommercial) {
                <option [value]="com.idCommercial">
                    {{ com.nom }} {{ com.prenom }}
                </option>
                }

            </select>
        </div>

        <div class="mt-2">
            <button type="button" (click)="updateProspect()" class="btn btn-success">
                Modifier
            </button>
        </div>

    </form>
</div>
